<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeStop - GPX Route Viewer & POI Manager</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/togeojson@0.16.0/togeojson.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-wrap: wrap;
        }

        #map {
            flex: 1;
            min-height: 60vh;
            background: #e0e0e0;
        }

        .sidebar {
            width: 350px;
            background: white;
            border-left: 1px solid #ddd;
            overflow-y: auto;
            padding: 20px;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .section {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .section h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="file"],
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="file"] {
            padding: 5px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 14px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .poi-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .poi-item {
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.2s;
        }

        .poi-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .poi-item-title {
            font-weight: bold;
            color: #333;
            font-size: 13px;
        }

        .poi-item-type {
            font-size: 12px;
            color: #667eea;
            margin-top: 3px;
        }

        .poi-item-delete {
            float: right;
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 3px;
        }

        .poi-item-delete:hover {
            background: #ff5252;
        }

        .poi-colors {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .poi-color-btn {
            width: 100%;
            height: 35px;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .poi-color-btn:hover {
            transform: scale(1.05);
            border-color: #667eea;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px;
            border-radius: 5px;
            font-size: 13px;
            color: #1565c0;
            margin-bottom: 15px;
        }

        .status-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            #map {
                min-height: 50vh;
            }

            .sidebar {
                width: 100%;
                border-left: none;
                border-top: 1px solid #ddd;
                max-height: 50vh;
            }
        }

        .leaflet-popup-content {
            font-family: inherit;
            font-size: 12px;
        }

        .popup-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .popup-type {
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="map"></div>
        
        <div class="sidebar">
            <h2>🚴 BikeStop</h2>
            
            <div class="info-box">
                📍 Lade deine GPX-Route hoch und füge Sehenswürdigkeiten hinzu!
            </div>

            <!-- GPX Upload Section -->
            <div class="section">
                <h3>📂 Route laden</h3>
                <input type="file" id="gpxFile" accept=".gpx">
                <button onclick="loadGPX()">GPX laden</button>
                <div class="status-text" id="gpxStatus"></div>
            </div>

            <!-- POI Type Selection -->
            <div class="section">
                <h3>🎯 Sehenswürdigkeit hinzufügen</h3>
                <select id="poiType">
                    <option value="🍕">🍕 Essen & Restaurants</option>
                    <option value="💧">💧 Wasser & Brunnen</option>
                    <option value="🚽">🚽 Toiletten</option>
                    <option value="🏪">🏪 Shops & Supermärkte</option>
                    <option value="🏕️">🏕️ Camping & Bivouac</option>
                    <option value="🦌">🦌 Tiere & Wildlife</option>
                    <option value="🏔️">🏔️ Landschaft & Viewpoints</option>
                    <option value="📸">📸 Fotospot</option>
                    <option value="⛽">⛽ Tankstelle</option>
                    <option value="🏥">🏥 Apotheke & Arzt</option>
                    <option value="🏨">🏨 Unterkunft</option>
                    <option value="⭐">⭐ Favorit</option>
                </select>
                <input type="text" id="poiName" placeholder="Name (z.B. 'Schöner See')">
                <input type="text" id="poiDescription" placeholder="Beschreibung (optional)">
                <p class="status-text">Klicke auf die Karte, um einen POI zu erstellen</p>
            </div>

            <!-- POI List -->
            <div class="section">
                <h3>📍 Meine POIs ({count})</h3>
                <div class="poi-list" id="poiList">
                    <p style="color: #999; font-size: 12px;">Keine POIs hinzugefügt</p>
                </div>
            </div>

            <!-- Export Section -->
            <div class="section">
                <h3>💾 Exportieren</h3>
                <button onclick="exportPOIs()">JSON exportieren</button>
                <button onclick="exportGeoJSON()">GeoJSON exportieren</button>
            </div>
        </div>
    </div>

    <script>
        // Leaflet Map initialisieren
        const map = L.map('map').setView([50.5, 10], 6);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        let pois = [];
        let gpxLayer = null;
        let selectedPoiType = '🍕';
        let creatingPoi = false;

        // POI Type Change
        document.getElementById('poiType').addEventListener('change', (e) => {
            selectedPoiType = e.target.value;
        });

        // Click on Map to add POI
        map.on('click', (e) => {
            const poiName = document.getElementById('poiName').value.trim();
            if (poiName === '') {
                alert('Bitte gib einen Namen für die Sehenswürdigkeit ein!');
                return;
            }

            const poi = {
                id: Date.now(),
                name: poiName,
                description: document.getElementById('poiDescription').value,
                type: selectedPoiType,
                lat: e.latlng.lat,
                lng: e.latlng.lng
            };

            addPOI(poi);
            document.getElementById('poiName').value = '';
            document.getElementById('poiDescription').value = '';
        });

        // Add POI to map
        function addPOI(poi) {
            pois.push(poi);

            const marker = L.marker(, {
                icon: L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="font-size: 28px; cursor: pointer;">${poi.type}</div>`,
                    iconSize: [32, 32],
                    iconAnchor: [16, 32]
                })
            }).addTo(map);

            marker.bindPopup(`
                <div class="popup-title">${poi.name}</div>
                <div class="popup-type">${poi.type}</div>
                ${poi.description ? `<div style="margin-top: 5px; font-size: 11px;">${poi.description}</div>` : ''}
                <div style="margin-top: 8px;">
                    <button onclick="deletePOI(${poi.id})" style="background: #ff6b6b; padding: 5px 10px; font-size: 11px;">Löschen</button>
                </div>
            `);

            marker.poi = poi;
            updatePOIList();
        }

        // Delete POI
        function deletePOI(id) {
            pois = pois.filter(p => p.id !== id);
            map.eachLayer((layer) => {
                if (layer.poi && layer.poi.id === id) {
                    map.removeLayer(layer);
                }
            });
            updatePOIList();
        }

        // Update POI List
        function updatePOIList() {
            const list = document.getElementById('poiList');
            if (pois.length === 0) {
                list.innerHTML = '<p style="color: #999; font-size: 12px;">Keine POIs hinzugefügt</p>';
                return;
            }

            list.innerHTML = pois.map(poi => `
                <div class="poi-item" onclick="centerPOI(${poi.lat}, ${poi.lng})">
                    <div class="poi-item-title">${poi.type} ${poi.name}</div>
                    <div class="poi-item-type">${poi.description || 'Keine Beschreibung'}</div>
                    <button class="poi-item-delete" onclick="event.stopPropagation(); deletePOI(${poi.id})">✕ Löschen</button>
                </div>
            `).join('');

            document.querySelector('.section h3').textContent = `📍 Meine POIs (${pois.length})`;
        }

        // Center POI
        function centerPOI(lat, lng) {
            map.setView([lat, lng], 15);
        }

        // Load GPX
        function loadGPX() {
            const file = document.getElementById('gpxFile').files[0];
            if (!file) {
                alert('Bitte wähle eine GPX-Datei aus!');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const gpxData = e.target.result;
                    const geoJSON = toGeoJSON.gpx(new DOMParser().parseFromString(gpxData, 'text/xml'));
                    
                    if (gpxLayer) {
                        map.removeLayer(gpxLayer);
                    }

                    gpxLayer = L.geoJSON(geoJSON, {
                        style: {
                            color: '#667eea',
                            weight: 3,
                            opacity: 0.8
                        }
                    }).addTo(map);

                    map.fitBounds(gpxLayer.getBounds());
                    document.getElementById('gpxStatus').textContent = '✅ GPX geladen!';
                } catch (error) {
                    alert('Fehler beim Laden der GPX-Datei: ' + error.message);
                    document.getElementById('gpxStatus').textContent = '❌ Fehler beim Laden';
                }
            };
            reader.readAsText(file);
        }

        // Export POIs as JSON
        function exportPOIs() {
            if (pois.length === 0) {
                alert('Keine POIs zum Exportieren!');
                return;
            }

            const dataStr = JSON.stringify(pois, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'bikestop-pois.json';
            link.click();
        }

        // Export as GeoJSON
        function exportGeoJSON() {
            if (pois.length === 0) {
                alert('Keine POIs zum Exportieren!');
                return;
            }

            const features = pois.map(poi => ({
                type: 'Feature',
                properties: {
                    name: poi.name,
                    description: poi.description,
                    type: poi.type
                },
                geometry: {
                    type: 'Point',
                    coordinates: 
                }
            }));

            const geoJSON = {
                type: 'FeatureCollection',
                features: features
            };

            const dataStr = JSON.stringify(geoJSON, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'bikestop-pois.geojson';
            link.click();
        }

        console.log('BikeStop App gestartet!');
    </script>
</body>
</html>
