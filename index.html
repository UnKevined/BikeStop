<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeStop - Mountain Scout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .map-section {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            text-align: center;
        }

        .map-display {
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect fill="%23e8f4f8" width="800" height="600"/><circle cx="400" cy="300" r="150" fill="%23c8e6c9" opacity="0.3"/><path d="M300 250 L350 200 L400 220 L450 180 L500 240" stroke="%238bc34a" stroke-width="2" fill="none"/><text x="400" y="320" font-size="20" fill="%23666" text-anchor="middle">📍 Deine Position</text></svg>') center/cover no-repeat;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-overlay {
            text-align: center;
        }

        .map-overlay h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .map-overlay p {
            font-size: 14px;
            opacity: 0.9;
        }

        .sidebar {
            width: 380px;
            background: white;
            border-left: 1px solid #ddd;
            overflow-y: auto;
            padding: 20px;
            box-shadow: -2px 0 8px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }

        .sidebar h1 {
            color: #2c5f2d;
            font-size: 20px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subtitle {
            color: #999;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .location-box {
            background: linear-gradient(135deg, #2c5f2d 0%, #4a8f50 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(44, 95, 45, 0.3);
            display: none;
        }

        .location-box h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .coords {
            font-size: 11px;
            opacity: 0.9;
            font-family: monospace;
            margin-bottom: 8px;
        }

        .section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .section h2 {
            font-size: 14px;
            color: #333;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .poi-item {
            background: #f9f9f9;
            border-left: 4px solid #2c5f2d;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .poi-item:hover {
            background: #f0f0f0;
            transform: translateX(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .poi-name {
            font-weight: bold;
            color: #333;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .poi-info {
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .stars {
            color: #ffc107;
            font-size: 12px;
        }

        .gps-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2c5f2d 0%, #4a8f50 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .gps-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(44, 95, 45, 0.3);
        }

        .export-button {
            width: 100%;
            padding: 10px;
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }

        .export-button:hover {
            background: #e0e0e0;
        }

        .no-data {
            color: #999;
            font-size: 12px;
            text-align: center;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .stat {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #2c5f2d;
        }

        .stat-label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .loading {
            color: #999;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-left: none;
                border-top: 1px solid #ddd;
                max-height: 45vh;
            }

            .map-section {
                height: 55vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="map-section">
            <div class="map-display">
                <div class="map-overlay">
                    <h2>⛰️ Mountain Scout</h2>
                    <p>Drücke "GPS aktivieren" um Gipfel & Pässe zu entdecken!</p>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <h1>⛰️ Mountain Scout</h1>
            <p class="subtitle">Entdecke Gipfel, Pässe & Natur</p>

            <button class="gps-button" onclick="getCurrentLocation()">📍 GPS aktivieren</button>

            <div class="location-box" id="locationBox">
                <h3 id="regionName">Loading...</h3>
                <div class="coords" id="coordsDisplay"></div>
            </div>

            <div class="section">
                <h2>⛰️ Gipfel & Berge</h2>
                <div id="peaksContainer" class="loading">Warte auf GPS...</div>
            </div>

            <div class="section">
                <h2>🛤️ Pässe & Routen</h2>
                <div id="passesContainer" class="loading">Warte auf GPS...</div>
            </div>

            <div class="section">
                <h2>📊 Statistiken</h2>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="peakCount">0</div>
                        <div class="stat-label">Gipfel gefunden</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="passCount">0</div>
                        <div class="stat-label">Pässe gefunden</div>
                    </div>
                </div>
            </div>

            <button class="export-button" onclick="exportJSON()">📥 JSON exportieren</button>
            <button class="export-button" onclick="exportGPX()">🗺️ GPX exportieren</button>
        </div>
    </div>

    <script>
        let currentLocation = null;
        let peaksData = [];
        let passesData = [];

        function getCurrentLocation() {
            if (!navigator.geolocation) {
                alert('GPS wird nicht unterstützt!');
                return;
            }

            console.log('GPS wird angefordert...');

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    console.log('GPS erfolgreich!', position);
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    currentLocation = { lat, lon };
                    
                    updateLocation(lat, lon);
                    loadPeaks(lat, lon);
                    loadPasses(lat, lon);
                },
                function(error) {
                    console.error('GPS Fehler:', error);
                    alert('GPS Fehler: ' + error.message);
                }
            );
        }

        function updateLocation(lat, lon) {
            const box = document.getElementById('locationBox');
            const region = document.getElementById('regionName');
            const coords = document.getElementById('coordsDisplay');

            region.textContent = 'Dein Standort';
            coords.textContent = `${lat.toFixed(4)}° N, ${lon.toFixed(4)}° E`;
            box.style.display = 'block';
        }

        function loadPeaks(lat, lon) {
            const peaks = [
                { name: 'Kandel', elevation: 1241, distance: 3.2, difficulty: 3, desc: 'Aussichtsberg mit Turm' },
                { name: 'Schauinsland', elevation: 1284, distance: 4.8, difficulty: 4, desc: 'Höchster Berg der Region' },
                { name: 'Belchen', elevation: 1415, distance: 5.1, difficulty: 4, desc: 'Malerischer Gipfel' }
            ];

            const html = peaks.map(p => `
                <div class="poi-item">
                    <div class="poi-name">⛰️ ${p.name}</div>
                    <div class="poi-info">
                        <span>Höhe: ${p.elevation}m</span>
                        <span>${p.distance}km entfernt</span>
                    </div>
                    <div class="stars">${'⭐'.repeat(p.difficulty)}</div>
                    <div style="font-size: 11px; color: #999; margin-top: 4px;">${p.desc}</div>
                </div>
            `).join('');

            document.getElementById('peaksContainer').innerHTML = html;
            document.getElementById('peakCount').textContent = peaks.length;
            peaksData = peaks;
        }

        function loadPasses(lat, lon) {
            const passes = [
                { name: 'Notschrei Pass', elevation: 1269, distance: 8.2, desc: 'Beliebter Gravel-Pass' },
                { name: 'Hofstetten Pass', elevation: 1190, distance: 12, desc: 'Technischer Gravel-Pass' }
            ];

            const html = passes.map(p => `
                <div class="poi-item">
                    <div class="poi-name">🛤️ ${p.name}</div>
                    <div class="poi-info">
                        <span>Höhe: ${p.elevation}m</span>
                        <span>${p.distance}km entfernt</span>
                    </div>
                    <div style="font-size: 11px; color: #999; margin-top: 4px;">${p.desc}</div>
                </div>
            `).join('');

            document.getElementById('passesContainer').innerHTML = html;
            document.getElementById('passCount').textContent = passes.length;
            passesData = passes;
        }

        function exportJSON() {
            if (!currentLocation) {
                alert('Bitte zuerst GPS aktivieren!');
                return;
            }

            const data = {
                timestamp: new Date().toISOString(),
                location: currentLocation,
                peaks: peaksData,
                passes: passesData
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mountain-scout.json';
            a.click();
        }

        function exportGPX() {
            if (!currentLocation) {
                alert('Bitte zuerst GPS aktivieren!');
                return;
            }

            let gpx = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1">\n';
            gpx += '<metadata><time>' + new Date().toISOString() + '</time></metadata>\n';
            gpx += '<wpt lat="' + currentLocation.lat + '" lon="' + currentLocation.lon + '"><name>Dein Standort</name></wpt>\n';

            peaksData.forEach((p, i) => {
                gpx += '<wpt lat="' + (currentLocation.lat + 0.01 * (i + 1)) + '" lon="' + (currentLocation.lon + 0.01 * (i + 1)) + '">\n';
                gpx += '<name>' + p.name + '</name>\n<ele>' + p.elevation + '</ele>\n</wpt>\n';
            });

            gpx += '</gpx>';

            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mountain-scout.gpx';
            a.click();
        }
    </script>
</body>
</html>
